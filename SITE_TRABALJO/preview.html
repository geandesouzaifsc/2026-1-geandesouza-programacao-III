<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pizza Simples</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
    <div class="logo">LOGO</div>
    <h1>Pizza Simples</h1>
</header>


<main class="container">

    <!-- Área principal -->
    <section class="area-principal">

        <div class="conteudo-grande">
            <p>Espaço principal</p>
            <p>Você pode colocar mapa, texto ou imagem aqui.</p>
        </div>

        <div class="menu-lateral">
            <ul>
                <li>FAQ</li>
                <li>Áreas</li>
                <li>Horários</li>
                <li>Local</li>
            </ul>
        </div>

    </section>


    <!-- Card de reserva -->
    <aside class="reserva">
        <h2>Reserve uma mesa</h2>

        <div class="icone">
            Espaço para ícone
        </div>

        <p>Preço simples</p>
        <p>R$ 50</p>
    </aside>


</main>


<!-- Botão doação -->
<section class="doacao">
    <button>Faça uma doação</button>
</section>


<footer class="rodape">
    <p>Endereço exemplo</p>
    <p>Telefone exemplo</p>
</footer>


</body>
</html>
